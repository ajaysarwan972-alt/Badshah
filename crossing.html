<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>Game</title>    

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>    

<style>    
body{font-family:Arial;background:#e5e7eb;margin:0;}    

.header{
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  background:#fff;
  border-radius:20px;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  z-index:999;
}

#menuBtn{font-size:22px;}

#userId{
  background:green;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

#wallet{
  background:red;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.topBtns{margin-top:80px;display:flex;justify-content:space-around;padding:10px;}
.topBtn{width:22%;padding:10px;border-radius:20px;text-align:center;color:white;font-size:12px;cursor:pointer;}
.btn1{background:#6c5ce7;}    
.btn2{background:#00b894;}    
.btn3{background:#0984e3;}    
.btn4{background:#e17055;}    

.container{margin:10px;background:#fff;padding:15px;border-radius:15px;padding-bottom:100px;}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.box{display:flex;flex-direction:column;width:100%;}

label{
  background:#f1f5f9;
  padding:6px 10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:5px;
  color:red;
  font-weight:bold;
  font-size:12px;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.btn{
  padding:12px;
  border:none;
  border-radius:12px;
  color:#fff;
  cursor:pointer;
}
.set{background:green;}
.back{background:red;}

.submit-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}
.card{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
  text-align:center;
  border:1px solid #ddd;
}
.num{color:red;font-weight:bold;}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  z-index:999;
}

.totalBar{
  width:50%;
  padding:15px;
  background:linear-gradient(to right, blue, red);
  color:white;
  text-align:center;
  font-size:18px;
}

.submitBar{
  width:50%;
  padding:15px;
  background:green;
  color:white;
  text-align:center;
  font-size:18px;
  cursor:pointer;
}

.whatsapp{
  position:fixed;
  bottom:80px;
  right:15px;
  width:45px;
  height:45px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
}
</style>    
</head>    

<body>    

<div class="header">
  <div id="menuBtn">≡</div>
  <div id="userId">ID: 0000</div>
  <div id="wallet">₹ 0</div>
</div>

<div class="topBtns">
  <div class="topBtn btn1" onclick="location.href='game.html'">JODI</div>
  <div class="topBtn btn2" onclick="location.href='harf.html'">HARUF</div>
  <div class="topBtn btn3" onclick="location.href='crossing.html'">CROSSING</div>
  <div class="topBtn btn4" onclick="location.href='copypast.html'">COPY PASTE</div>
</div>

<div class="container">      

  <div class="row">    
    <div class="box">    
      <label>1ST NUMBER</label>    
      <input type="number" id="num1">    
    </div>    
    <div class="box">    
      <label>2ND NUMBER</label>    
      <input type="number" id="num2">    
    </div>    
  </div>      

  <div class="box" style="margin-top:10px;">    
    <label>POINTS</label>    
    <input type="number" id="points" oninput="calcTotal()">    
  </div>      

  <div class="submit-row">    
    <button class="btn set" onclick="generate()">SET</button>    
    <button class="btn back" onclick="resetAll()">BACK</button>    
  </div>      

  <div class="grid" id="grid"></div>    
</div>    

<div class="bottom">    
  <div class="totalBar" id="total">₹ 0</div>    
  <div class="submitBar" onclick="finalSubmit()">SUBMIT</div>    
</div>    

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">💬</a>    

<script>    

const user = JSON.parse(localStorage.getItem("user"));  
if(!user){ window.location.href="index.html"; }  

const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// ✅ MARKET FROM HOME
const market = localStorage.getItem("market") || "UNKNOWN";

// ✅ STORE GENERATED DATA
let betList = [];

async function loadWallet(){
  const { data } = await client.from("login").select("balance").eq("id", user.id).single();
  if(data){
    wallet.innerText="₹ "+data.balance;
    userId.innerText="ID: "+user.id;
  }
}
loadWallet();

function calcTotal(){
  let amt = Number(points.value)||0;
  total.innerText="₹ "+amt;
}

function generate(){
  let n1 = num1.value;
  let n2 = num2.value;
  let amt = Number(points.value);

  if(!n1 || !n2 || !amt){
    alert("Fill all");
    return;
  }

  let g = document.getElementById("grid");
  g.innerHTML="";

  let totalAmt = 0;
  betList = []; // reset

  for(let i=0;i<n1.length;i++){
    for(let j=0;j<n2.length;j++){
      let pair = n1[i]+n2[j];

      // ✅ SAVE EACH NUMBER
      betList.push({
        number: pair,
        amount: amt
      });

      let div = document.createElement("div");
      div.className="card";
      div.innerHTML=`<div class="num">${pair}</div><div>₹ ${amt}</div>`;
      g.appendChild(div);

      totalAmt += amt;
    }
  }

  total.innerText="₹ "+totalAmt;
}

// ✅ FINAL SUBMIT
async function finalSubmit(){
  let amt = Number(total.innerText.replace("₹",""));

  if(amt<=0){
    alert("No data");
    return;
  }

  const { data } = await client.from("login").select("balance").eq("id", user.id).single();

  if(data.balance < amt){
    alert("Insufficient balance");
    return;
  }

  await client.from("login").update({ balance: data.balance - amt }).eq("id", user.id);

  // ✅ HISTORY SAVE (REAL DATA)
  await client.from("history").insert([{
    user_id: user.id,
    market: market,
    data: JSON.stringify(betList),
    total: amt
  }]);

  alert("Game Submitted");
  location.reload();
}

function resetAll(){
  num1.value="";
  num2.value="";
  points.value="";
  grid.innerHTML="";
  total.innerText="₹ 0";
}

</script>    

</body>    
</html>
