<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Games</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#e5e7eb;}
.header{position:fixed;top:10px;left:10px;right:10px;background:#fff;padding:10px;border-radius:20px;display:flex;justify-content:space-between;z-index:999;}
#userId{background:green;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
#wallet{background:red;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
.topBtns{margin-top:80px;display:flex;justify-content:space-around;}
.topBtn{width:18%;padding:10px;border-radius:20px;color:#fff;text-align:center;cursor:pointer;font-size:12px;}
.btn1{background:#6c5ce7;}
.btn2{background:#00b894;}
.btn3{background:#0984e3;}
.btn4{background:#e17055;}
.btn5{background:#111;}
.game{display:none;}
.active{display:block;}
.container{margin:10px;background:#fff;padding:15px;border-radius:15px;padding-bottom:120px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.box{background:#fff;padding:10px;border-radius:10px;text-align:center;border:1px solid #ddd;}
input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}
.bottom{position:fixed;bottom:0;width:100%;display:flex;}
.total{width:50%;background:linear-gradient(to right,blue,red);color:#fff;text-align:center;padding:15px;}
.submit{width:50%;background:green;color:#fff;text-align:center;padding:15px;}
</style>
</head>

<body>

<div class="header">
<div id="userId">ID: 0</div>
<div id="wallet">₹ 0</div>
</div>

<div class="topBtns">
<div class="topBtn btn1" onclick="showGame('jodi')">JODI</div>
<div class="topBtn btn2" onclick="showGame('haruf')">HARUF</div>
<div class="topBtn btn3" onclick="showGame('crossing')">CROSSING</div>
<div class="topBtn btn4" onclick="showGame('copy')">COPY</div>
<div class="topBtn btn5" onclick="showGame('play')">TYPING/IMAGE</div>
</div>

<div id="jodi" class="game active container">
<div class="grid" id="jodiGrid"></div>
</div>

<div id="haruf" class="game container">
<h3>Single Andar</h3>
<div class="grid" id="harufGrid1"></div>
<h3>Single Bahar</h3>
<div class="grid" id="harufGrid2"></div>
</div>

<div id="crossing" class="game container">
<label>1ST NUMBER</label>
<input id="num1">
<label>2ND NUMBER</label>
<input id="num2">
<label>POINTS</label>
<input id="points">
<button onclick="generateCross()">SET</button>
<div id="crossGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;"></div>
</div>

<div id="copy" class="game container">
<label>ENTER DIGIT</label>
<input id="digits">
<label>ENTER AMOUNT</label>
<input id="amt">
<br><br>
<label><input type="radio" name="p" value="with" checked> With Palti</label>
<label><input type="radio" name="p" value="without"> Without Palti</label>
<button onclick="generateCopy()">ADD</button>
<table id="table" border="1" width="100%">
<tr><th>NUMBER</th><th>AMOUNT</th><th>DEL</th></tr>
</table>
</div>

<div id="play" class="game container"></div>

<div class="bottom">
<div class="total" id="total">₹ 0</div>
<div class="submit" onclick="submitAll()">SUBMIT</div>
</div>

<script>

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

const user = JSON.parse(localStorage.getItem("user"));

async function loadWallet(){
let {data}=await client.from("login").select("balance").eq("id",user.id).single();
document.getElementById("wallet").innerText="₹ "+data.balance;
document.getElementById("userId").innerText="ID: "+user.id;
}
loadWallet();

let dataArr=[];
let copyMap={};

function add(num,val){
val = Number(val)||0;
dataArr = dataArr.filter(i=>i.number!==num);
if(val>0){ dataArr.push({number:num,amount:val}); }
updateTotal();
}

function generateCross(){
let n1=num1.value;
let n2=num2.value;
let amt=Number(points.value)||0;

if(!n1||!n2||!amt){showMsg("Fill all ❌","red");return;}

dataArr = dataArr.filter(i=>!i.crossing);
crossGrid.innerHTML="";

let set=new Set();

for(let i of n1){
for(let j of n2){
let pair=i+j;
if(!set.has(pair)){
set.add(pair);
dataArr.push({number:pair,amount:amt,crossing:true});
crossGrid.innerHTML+=`<div class="box">${pair}<br>₹${amt}</div>`;
}
}
}

updateTotal();
}

function generateCopy(){
let d=digits.value;
let a=Number(amt.value)||0;
let type=document.querySelector('input[name="p"]:checked').value;

if(!d||!a){showMsg("Fill data ❌","red");return;}

dataArr = dataArr.filter(i=>!i.copy);
copyMap={};

table.innerHTML=`<tr><th>NUMBER</th><th>AMOUNT</th><th>DEL</th></tr>`;

let arr=d.toString().match(/.{1,2}/g);

arr.forEach(num=>{
if(num.length==1) num="0"+num;

if(!copyMap[num]) addCopy(num,a);

if(type=="with"){
let rev=num.split("").reverse().join("");
if(rev!=num && !copyMap[rev]) addCopy(rev,a);
}
});

updateTotal();
}

function addCopy(num,a){
copyMap[num]=true;
dataArr.push({number:num,amount:a,copy:true});

table.innerHTML+=`<tr>
<td>${num}</td>
<td>${a}</td>
<td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
</tr>`;
}

function updateTotal(){
let t=dataArr.reduce((s,i)=>s+i.amount,0);
document.getElementById("total").innerText="₹ "+t;
}

function showGame(id){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// POPUP
function showMsg(text,color){
let div=document.createElement("div");
div.style.position="fixed";
div.style.top="50%";
div.style.left="50%";
div.style.transform="translate(-50%,-50%)";
div.style.background=color;
div.style.color="#fff";
div.style.padding="15px 25px";
div.style.borderRadius="10px";
div.style.zIndex="9999";
div.innerText=text;
document.body.appendChild(div);
setTimeout(()=>{div.remove();},1500);
}

// JODI
for(let i=0;i<100;i++){
let n=i.toString().padStart(2,'0');
jodiGrid.innerHTML+=`<div class="box">${n}<input oninput="add('${n}',this.value)"></div>`;
}

// HARUF
for(let i=0;i<10;i++){
harufGrid1.innerHTML+=`<div class="box">${i}<input oninput="add('${i}',this.value)"></div>`;
harufGrid2.innerHTML+=`<div class="box">${i}<input oninput="add('${i}',this.value)"></div>`;
}

// SUBMIT
async function submitAll(){

let total = dataArr.reduce((s,i)=>s+i.amount,0);

if(total<=0){
showMsg("No Data ❌","red");
return;
}

let {data:userData} = await client.from("login").select("balance").eq("id",user.id).single();

if(userData.balance < total){
showMsg("Amount is low ❌","red");
return;
}

let newBal = userData.balance - total;

await client.from("login").update({balance:newBal}).eq("id",user.id);

document.getElementById("wallet").innerText="₹ "+newBal;

showMsg("Submit OK ✅","green");

// clear
digits.value="";
amt.value="";
num1.value="";
num2.value="";
points.value="";

dataArr=[];
copyMap={};
crossGrid.innerHTML="";
table.innerHTML=`<tr><th>NUMBER</th><th>AMOUNT</th><th>DEL</th></tr>`;

updateTotal();
}

</script>

</body>
</html>
