<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single Game</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="menu.js"></script>

<style>
/* SAME CSS — NO CHANGE */
body{
  font-family:Arial;
  background:#e5e7eb;
  margin:0;
}

.header{
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  background:#fff;
  border-radius:20px;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  z-index:999;
}

#menuBtn{ font-size:22px; }

#userId{
  background:green;
  color:white;
  padding:6px 15px;
  border-radius:20px;
  font-weight:bold;
  font-size:13px;
}

#wallet{
  background:red;
  color:#fff;
  padding:6px 15px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
}

.topBtns{
  margin-top:80px;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.topBtn{
  width:22%;
  padding:10px;
  border-radius:20px;
  text-align:center;
  color:white;
  font-weight:bold;
  font-size:12px;
  cursor:pointer;
}

.btn1{background:#6c5ce7;}
.btn2{background:#00b894;}
.btn3{background:#0984e3;}
.btn4{background:#e17055;}

.container{
  margin:15px;
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}

.box{ text-align:center; }

label{
  color:red;
  font-weight:bold;
  font-size:13px;
}

input{
  width:100%;
  height:35px;
  border-radius:10px;
  border:1px solid #ccc;
  text-align:center;
  font-size:14px;
}

.bottom{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.btn{
  width:32%;
  padding:12px;
  border:none;
  border-radius:15px;
  color:#fff;
  font-size:14px;
}

.submit{background:#22c55e;}
.back{background:#ef4444;}
.total{background:#f43f5e;}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:15px;
  width:45px;
  height:45px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
}
</style>
</head>

<body>

<div class="header">
  <div id="menuBtn" onclick="openMenu()">≡</div>
  <div id="userId">ID: 0000</div>
  <div id="wallet">₹ 0</div>
</div>

<div class="topBtns">
  <div class="topBtn btn1" onclick="goJodi()">JODI</div>
  <div class="topBtn btn2" onclick="goHaruf()">HARUF</div>
  <div class="topBtn btn3" onclick="goCrossing()">CROSSING</div>
  <div class="topBtn btn4" onclick="goCopy()">COPY PASTE</div>
</div>

<div class="container">
  <h2>Single Andar</h2>
  <div class="grid" id="andar"></div>

  <h2>Single Bahar</h2>
  <div class="grid" id="bahar"></div>

  <div class="bottom">
    <button class="btn total" id="total">₹ 0</button>
    <button class="btn submit" onclick="calculate()">SUBMIT</button>
    <button class="btn back" onclick="goBack()">BACK</button>
  </div>
</div>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">💬</a>

<script>

const user = JSON.parse(localStorage.getItem("user"));
if(!user){
  window.location.href = "index.html";
}

const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// ✅ MARKET FIX (HOME SE)
let market = localStorage.getItem("market");

// WALLET
async function loadWallet(){
  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data){
    document.getElementById("wallet").innerText = "₹ " + data.balance;
    document.getElementById("userId").innerText = "ID: " + user.id;
  }
}
loadWallet();

// NAV
function goJodi(){ location.href="game.html"; }
function goHaruf(){ location.href="harf.html"; }
function goCrossing(){ location.href="crossing.html"; }
function goCopy(){ location.href="copypast.html"; }

// CREATE BOXES
function createBoxes(id){
  let container = document.getElementById(id);

  for(let i=0;i<10;i++){
    let div = document.createElement("div");
    div.className="box";

    div.innerHTML = `
      <label>${i}</label>
      <input type="number" oninput="calcTotal()">
    `;

    container.appendChild(div);
  }
}

createBoxes("andar");
createBoxes("bahar");

// TOTAL
function calcTotal(){
  let inputs = document.querySelectorAll("input");
  let total = 0;

  inputs.forEach(inp=>{
    total += Number(inp.value) || 0;
  });

  document.getElementById("total").innerText = "₹ " + total;
}

// ✅ FINAL SUBMIT FIX
async function calculate(){

  let andarInputs = document.querySelectorAll("#andar input");
  let baharInputs = document.querySelectorAll("#bahar input");

  let total = 0;
  let dataArr = [];

  // A (ANDAR)
  andarInputs.forEach((inp,i)=>{
    let val = Number(inp.value) || 0;
    total += val;

    if(val > 0){
      dataArr.push({
        type: "A",
        number: i,
        amount: val
      });
    }
  });

  // B (BAHAR)
  baharInputs.forEach((inp,i)=>{
    let val = Number(inp.value) || 0;
    total += val;

    if(val > 0){
      dataArr.push({
        type: "B",
        number: i,
        amount: val
      });
    }
  });

  if(total <= 0){
    alert("Amount dalo");
    return;
  }

  const { data } = await client
    .from("login")
    .select("balance")
    .eq("id", user.id)
    .single();

  if(data.balance < total){
    alert("Insufficient balance");
    return;
  }

  await client
    .from("login")
    .update({ balance: data.balance - total })
    .eq("id", user.id);

  await client
    .from("history")
    .insert([{
      user_id: user.id,
      market: market,
      data: JSON.stringify(dataArr),
      total: total
    }]);

  alert("Game Submitted");
  location.reload();
}

function goBack(){
  window.history.back();
}

</script>

</body>
</html>
