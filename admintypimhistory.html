<!DOCTYPE html>
<html>
<head>
<title>Admin History</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif; background:#f5f5f5;">

<h2 style="text-align:center;">Admin History</h2>

<div id="data"></div>

<script>

// 🔥 SUPABASE CONNECT
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 LOAD DATA
async function loadData(){

let { data, error } = await client
.from("typing_image")
.select("*")
.order("id", { ascending: false });

if(error){
alert("Error loading data");
console.log(error);
return;
}

let html = "";

data.forEach(item => {

html += `
<div style="
background:#fff;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
">

<p><b>User ID:</b> ${item.user_id}</p>
<p><b>Market:</b> ${item.market}</p>
<p><b>Amount:</b> ₹${item.total}</p>
`;

// 🔥 TEXT / IMAGE SHOW
if(item.data){

if(item.data.includes("http")){
html += `<img src="${item.data}" style="width:100%; margin-top:10px; border-radius:10px;">`;
}else{
html += `<p style="margin-top:10px;">${item.data}</p>`;
}

}

html += `</div>`;

});

document.getElementById("data").innerHTML = html;

}

loadData();

</script>

</body>
</html>
