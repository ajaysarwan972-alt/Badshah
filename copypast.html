<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Paste</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#e5e7eb;margin:0;}

.header{
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  background:#fff;
  border-radius:20px;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  z-index:999;
}

#menuBtn{font-size:22px;}

#userId{
  background:green;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

#wallet{
  background:red;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.topBtns{margin-top:80px;display:flex;justify-content:space-around;padding:10px;}
.topBtn{width:22%;padding:10px;border-radius:20px;text-align:center;color:#fff;font-size:12px;cursor:pointer;}
.btn1{background:#6c5ce7;} .btn2{background:#00b894;} .btn3{background:#0984e3;} .btn4{background:#e17055;}

.container{margin:10px;background:#fff;padding:15px;border-radius:15px;padding-bottom:120px;}

.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

label{background:#f1f5f9;padding:6px;border-radius:8px;border:1px solid #ccc;color:red;font-weight:bold;font-size:12px;}
input{padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;}

.radio{display:flex;justify-content:space-around;margin:15px 0;}
.radio label{background:#0f766e;color:#fff;padding:10px;border-radius:10px;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{border:1px solid #ccc;padding:10px;text-align:center;}
th{color:red;}

.del{background:red;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;}

.bottom{position:fixed;bottom:0;width:100%;display:flex;}
.total{width:33%;background:#ef4444;color:#fff;text-align:center;padding:15px;}
.submit{width:34%;background:#22c55e;color:#fff;text-align:center;padding:15px;cursor:pointer;}
.back{width:33%;background:#ef4444;color:#fff;text-align:center;padding:15px;cursor:pointer;}

.whatsapp{position:fixed;bottom:80px;right:15px;background:#25D366;color:#fff;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;}
</style>
</head>

<body>

<div class="header">
  <div id="menuBtn">≡</div>
  <div id="userId">ID: 0</div>
  <div id="wallet">₹ 0</div>
</div>

<div class="topBtns">
  <div class="topBtn btn1" onclick="location.href='game.html'">JODI</div>
  <div class="topBtn btn2" onclick="location.href='harf.html'">HARUF</div>
  <div class="topBtn btn3" onclick="location.href='crossing.html'">CROSSING</div>
  <div class="topBtn btn4" onclick="location.href='copypast.html'">COPY PASTE</div>
</div>

<div class="container">

<div class="row">
  <div>
    <label>ENTER DIGIT</label>
    <input type="number" id="digits">
  </div>
  <div>
    <label>ENTER AMOUNT</label>
    <input type="number" id="amt">
  </div>
</div>

<div class="radio">
  <label><input type="radio" name="p" value="with" checked> With Palti</label>
  <label><input type="radio" name="p" value="without"> Without Palti</label>
</div>

<button onclick="generate()">ADD</button>

<table id="table">
<tr><th>NUMBER</th><th>AMOUNT</th><th>ACTION</th></tr>
</table>

</div>

<div class="bottom">
  <div class="total" id="total">₹ 0</div>
  <div class="submit" onclick="submitData()">SUBMIT</div>
  <div class="back" onclick="location.reload()">BACK</div>
</div>

<a class="whatsapp" href="https://wa.me/919876543210">💬</a>

<script>

let list=[];
let total=0;

const user = JSON.parse(localStorage.getItem("user"));
if(!user){ location.href="index.html"; }

const client = supabase.createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// ✅ MARKET FROM HOME
const market = localStorage.getItem("market") || "UNKNOWN";

async function loadWallet(){
  const { data } = await client.from("login").select("balance").eq("id", user.id).single();
  if(data){
    wallet.innerText="₹ "+data.balance;
    userId.innerText="ID: "+user.id;
  }
}
loadWallet();

// GENERATE
function generate(){
  let d = digits.value;
  let a = Number(amt.value);
  let type = document.querySelector('input[name="p"]:checked').value;

  if(!d || !a){ alert("Fill all"); return; }

  let arr = d.toString().match(/.{1,2}/g);

  arr.forEach(num=>{
    if(num.length==1) num="0"+num;

    addRow(num,a);

    if(type=="with"){
      let rev = num.split("").reverse().join("");
      if(rev!=num) addRow(rev,a);
    }
  });

  digits.value="";
  amt.value="";
}

// ADD ROW
function addRow(num,a){
  list.push({num,a});
  total+=a;

  let tr=document.createElement("tr");

  tr.innerHTML=`
  <td>${num}</td>
  <td>${a}</td>
  <td><button class="del" onclick="delRow(this,${a})">Delete</button></td>
  `;

  document.getElementById("table").appendChild(tr);

  document.getElementById("total").innerText="₹ "+total;
}

// DELETE
function delRow(btn,a){
  btn.parentElement.parentElement.remove();
  total-=a;
  document.getElementById("total").innerText="₹ "+total;
}

// ✅ SUBMIT + HISTORY
async function submitData(){
  if(total<=0){ alert("No data"); return; }

  const { data } = await client.from("login").select("balance").eq("id", user.id).single();

  if(data.balance < total){
    alert("Insufficient balance");
    return;
  }

  await client.from("login").update({ balance: data.balance - total }).eq("id", user.id);

  // ✅ HISTORY SAVE
  await client.from("history").insert([{
    user_id: user.id,
    market: market,
    data: JSON.stringify(list),
    total: total
  }]);

  alert("Game Submitted");
  location.reload();
}

</script>

</body>
</html>
