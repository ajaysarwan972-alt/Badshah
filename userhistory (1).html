<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#f2f2f2;
    font-family:Arial;
    margin:0;
}

.header{
  background:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.card{
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

.row{
    display:flex;
    justify-content:space-between;
}

.market{
    color:red;
    font-weight:bold;
}

.date{
    font-size:12px;
    color:#666;
}

.bet{
    margin-top:5px;
}

.amount{
    background:red;
    color:#fff;
    padding:5px 10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">My History</div>
<div id="history"></div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    alert("Login first");
    window.location.href = "index.html";
}

const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

async function loadHistory(){

    let { data, error } = await client
        .from("history")
        .select("*")
        .eq("user_id", user.id)
        .order("id", { ascending: false });

    if(error){
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(item=>{

        let date = new Date(item.created_at).toLocaleString();

        // =========================
        // ✅ TYPING
        if(item.typing){
            html += `
            <div class="card">
                <div class="row">
                    <div class="market">${item.market}</div>
                    <div class="date">${date}</div>
                </div>
                <div class="bet">Typing: ${item.typing}</div>
                <div class="amount">₹ ${item.total}</div>
            </div>
            `;
        }

        // =========================
        // ✅ IMAGE
        if(item.image){
            html += `
            <div class="card">
                <div class="row">
                    <div class="market">${item.market}</div>
                    <div class="date">${date}</div>
                </div>
                <div class="bet">
                    <img src="${item.image}" width="100%">
                </div>
                <div class="amount">₹ ${item.total}</div>
            </div>
            `;
        }

        // =========================
        // ✅ NORMAL DATA
        if(item.data){

            let arr;

            try{
                arr = JSON.parse(item.data);
            }catch{
                return;
            }

            if(!Array.isArray(arr)) return;

            arr.forEach(n => {

                let num = "";
                let amount = 0;

                // ANDAR
                if(n.type === "A" && n.number != null){
                    num = n.number + "×";
                    amount = n.amount || 0;
                }

                // BAHAR
                else if(n.type === "B" && n.number != null){
                    num = "×" + n.number;
                    amount = n.amount || 0;
                }

                // NORMAL
                else if(n.number && n.amount){
                    num = String(n.number).padStart(2,'0');
                    amount = n.amount;
                }

                // COPY
                else if(n.num && n.a){
                    num = String(n.num).padStart(2,'0');
                    amount = n.a;
                }

                // OTHER (force show)
                else{
                    num = JSON.stringify(n);
                    amount = "";
                }

                html += `
                <div class="card">
                    <div class="row">
                        <div class="market">${item.market}</div>
                        <div class="date">${date}</div>
                    </div>

                    <div class="row bet">
                        <div>Bet No: ${num}</div>
                        <div class="amount">₹ ${amount}</div>
                    </div>
                </div>
                `;
            });
        }

    });

    document.getElementById("history").innerHTML = html || "No Data Found";
}

loadHistory();

</script>

</body>
</html>
